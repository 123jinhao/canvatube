<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Canva Project</title>

<style>

body{
font-family:Arial;
background:#eef;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:15px;
width:400px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
}

button{
width:100%;
padding:12px;
font-size:18px;
background:#00c4cc;
border:none;
color:white;
cursor:pointer;
border-radius:8px;
}

button:hover{
background:#009ea5;
}

</style>

</head>
<body>

<div class="box">

<h2>Add Canva Project</h2>

<input id="name" placeholder="Project Name">

<input id="link" placeholder="Canva Link">

<button onclick="addProject()">Add Project</button>

</div>

<script>

let projects=JSON.parse(localStorage.getItem("canvaProjects")) || [];

function addProject(){

const name=document.getElementById("name").value.trim();

const link=document.getElementById("link").value.trim();

if(name==""||link==""){
alert("Fill everything.");
return;
}

projects.push({
name,
link
});

localStorage.setItem("canvaProjects",JSON.stringify(projects));

alert("Project Added!");

document.getElementById("name").value="";
document.getElementById("link").value="";

}

</script>

</body>
</html>
